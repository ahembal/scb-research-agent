# deploy/turtle/manifests/ingress.yaml
# Ingress resource for the Turtle homelab deployment.
# Routes research-agent.turtle.local → research-agent service.
# Requires nginx Ingress controller running on NodePort 32080/32443.
# Add to /etc/hosts on your laptop:
#   192.168.1.16  research-agent.turtle.local
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: research-agent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: research-agent.turtle.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: research-agent
                port:
                  number: 80
