# deploy/turtle/manifests/kustomization.yaml
# Turtle homelab overlay.
# Forces scheduling on quick-thrush — Flannel on sought-perch is unstable.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: workshop

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: research-agent
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/hostname: quick-thrush
            containers:
              - name: research-agent
                image: ahembal/scb-research-agent:latest
                imagePullPolicy: Always
  - patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: research-agent
      spec:
        type: NodePort
        ports:
          - protocol: TCP
            port: 80
            targetPort: 8000
            nodePort: 31000
