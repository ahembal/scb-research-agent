# deploy/base/deployment.yaml
# Deploys the research agent as a single replica pod.
# For the workshop one replica is sufficient.
# Scale up by increasing replicas for production use.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-agent
  labels:
    app: research-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: research-agent
  template:
    metadata:
      labels:
        app: research-agent
    spec:
      # Security context at pod level — applies to all containers
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: research-agent
          image: research-agent:latest
          # Never pull from registry — use the locally loaded image
          # This is overridden in the cloud overlay to Always
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          # Security context at container level
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # Load non-secret config from ConfigMap
          envFrom:
            - configMapRef:
                name: research-agent-config
          # Load secret config from Secret
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: research-agent-secret
                  key: ANTHROPIC_API_KEY
          # Resource limits prevent the container from starving other pods
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Liveness probe — restart pod if app stops responding
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
